<div class="login-wrapper">
  <div class="login-card">
    <div class="header">
      <div class="logo">
        <i class="material-icons" style="font-size: 60px; color: #4db8ff;">security</i>
      </div>
      <h1>CYBER SECURITY</h1>
      <p>Secure Access Control</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="login()">
      <div class="input-group">
        <label>EMAIL ADDRESS</label>
        <input type="text" class="cyber-input" name="username" [(ngModel)]="email" placeholder="admin@secure.com" required>
      </div>

      <div class="input-group">
        <label>ACCESS KEY</label>
        <input type="password" class="cyber-input" name="password" [(ngModel)]="password" placeholder="********" required>
      </div>

      <button type="submit" class="cyber-btn primary" [disabled]="loading">
        <span *ngIf="!loading">SYSTEM LOGIN</span>
        <div class="spinner" *ngIf="loading"></div>
      </button>
    </form>

    <div class="divider">
      <span>OU BIOMÉTRIQUE</span>
    </div>

    <button class="cyber-btn secondary" (click)="faceLogin()" [disabled]="faceLoading">
      <span *ngIf="!faceLoading">IDENTIFY WITH FACE</span>
      <div class="spinner" *ngIf="faceLoading"></div>
    </button>

    <div *ngIf="error" class="error-msg">
      {{ error }}
    </div>
    <div *ngIf="success" class="success-msg">
      {{ success }}
    </div>
  </div>
</div>
