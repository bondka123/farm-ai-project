<div class="wrapper wrapper-full-page">
  <div class="page-header login-page header-filter" filter-color="black" style="background-color: #1e1e2f; align-items: center;">
    <div class="container">
      <div class="row">
        <div class="col-lg-4 col-md-6 col-sm-8 ml-auto mr-auto">
          <form class="form">
            <div class="card card-login card-hidden" style="background: rgba(30,30,47,0.95); border: 1px solid #e14eca; box-shadow: 0 0 20px rgba(225, 78, 202, 0.2);">
              <div class="card-header card-header-primary text-center" style="background: linear-gradient(60deg, #ba54f5, #e14eca);">
                <h4 class="card-title">Enregistrement du visage</h4>
              </div>
              <div class="card-body text-center mt-4">
                
                <p class="text-light">Veuillez scanner votre visage pour activer votre accès. Ce processus est obligatoire.</p>

                <div *ngIf="loading" class="text-info mt-3">
                  <i class="material-icons spin" style="font-size: 40px; animation: spin 2s linear infinite;">autorenew</i>
                  <p class="mt-2">Ouverture de la caméra et enregistrement en cours...</p>
                </div>

                <div *ngIf="success" class="text-success mt-3">
                  <i class="material-icons" style="font-size: 40px; color: #4caf50;">check_circle</i>
                  <p class="mt-2">{{ success }}</p>
                  <p class="text-muted small">Redirection vers le dashboard...</p>
                </div>

                <div *ngIf="error" class="text-danger mt-3">
                  <i class="material-icons" style="font-size: 40px; color: #f44336;">error</i>
                  <p class="mt-2">{{ error }}</p>
                </div>

                <div class="mt-4" *ngIf="!loading && !success">
                  <button type="button" class="btn btn-primary" (click)="scanFace()" [disabled]="loading || error.includes('No user ID')">
                    <i class="material-icons">camera_alt</i> Scanner mon visage
                  </button>
                </div>

              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
